services:
  - type: web
    name: benefits-navigator
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: AWS_REGION
        value: us-east-1
      - key: MODEL_ID
        value: global.amazon.nova-2-lite-v1:0
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
