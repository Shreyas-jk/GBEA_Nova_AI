name: evals

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write   # nightly job opens an issue on regression

env:
  AWS_REGION: us-east-1
  MODEL_ID: global.amazon.nova-2-lite-v1:0
  PYTHONUNBUFFERED: "1"

jobs:
  # PR gate: pytest + smoke conversation subset + full retrieval. Budget ~2 min.
  smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest (rules engine + harness self-tests)
        run: pytest tests/ -q

      - name: Smoke evals
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python -m evals.runners.run_all --subset smoke --cost-cap 20

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-eval-report
          path: |
            evals/reports/latest.md
            evals/reports/history.jsonl

  # Nightly: full suite, capped at 100 judge calls. Posts artifact + opens
  # an issue if pass rate dropped >= 10pp vs. previous nightly.
  nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest
        run: pytest tests/ -q

      - name: Full evals (cost cap 100)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python -m evals.runners.run_all --cost-cap 100

      - name: Upload full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-eval-report
          path: |
            evals/reports/latest.md
            evals/reports/history.jsonl

      - name: Check for regression and open issue if needed
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          history = Path("evals/reports/history.jsonl")
          if not history.exists():
              print("No history.jsonl yet; skipping regression check.")
              raise SystemExit(0)

          rows = [json.loads(line) for line in history.read_text().splitlines() if line.strip()]
          conv_rows = [r for r in rows if r.get("kind") == "conversation_evals" and r.get("subset") in (None, "null")]
          if len(conv_rows) < 2:
              print(f"Only {len(conv_rows)} historical full runs; need 2 to compare.")
              raise SystemExit(0)

          curr = conv_rows[-1]["pass_rate"]
          prev = conv_rows[-2]["pass_rate"]
          drop_pp = (prev - curr) * 100
          print(f"Previous pass rate: {prev:.1%}; current: {curr:.1%}; drop: {drop_pp:.1f}pp")
          if drop_pp < 10:
              raise SystemExit(0)

          repo = os.environ["REPO"]
          run_url = os.environ["RUN_URL"]
          title = f"Eval regression: pass rate dropped {drop_pp:.1f}pp"
          body = (
              f"Nightly conversation evals regressed.\n\n"
              f"- Previous pass rate: {prev:.1%}\n"
              f"- Current pass rate: {curr:.1%}\n"
              f"- Drop: {drop_pp:.1f} percentage points\n\n"
              f"Failing IDs (current run): {conv_rows[-1].get('failing_ids', [])}\n\n"
              f"Run: {run_url}\n"
              f"See artifact 'nightly-eval-report' for full latest.md."
          )
          subprocess.run(
              ["gh", "issue", "create", "--title", title, "--body", body, "--label", "eval-regression"],
              check=True,
          )
          PY
